{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Court Vision{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Narrow:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --base:      #0B0D10;
            --surface:   #14181D;
            --raised:    #1B2027;
            --hover:     #222831;
            --text:      #ECEAE4;
            --muted:     #8A94A2;
            --slate:     #5A6472;
            --accent:    #F0702F;
            --accent-dim:#B4551F;
            --accent-soft:#3A2418;
            --cool:      #6C8CA8;
            --border:    #262C34;
            --border-lit:#37404B;
            --make:      #F0702F;
            --miss:      #4A5563;

            --display: 'Archivo Narrow', 'Oswald', sans-serif;
            --body: 'Inter', sans-serif;
            --mono: 'IBM Plex Mono', monospace;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background:
                radial-gradient(1200px 600px at 50% -10%, #12171d 0%, transparent 60%),
                var(--base);
            color: var(--text); font-family: var(--body); line-height: 1.6;
            -webkit-font-smoothing: antialiased; min-height: 100vh;
        }
        a { color: inherit; text-decoration: none; }
        .wrap { max-width: 1040px; margin: 0 auto; padding: 0 28px; }

        /* ---- Masthead ---- */
        .masthead {
            border-bottom: 1px solid var(--border); padding: 18px 0;
            position: sticky; top: 0; z-index: 20;
            background: rgba(11,13,16,0.82); backdrop-filter: blur(14px) saturate(1.2);
        }
        .masthead .wrap { display: flex; align-items: center; gap: 18px; }
        .brand { font-family: var(--display); font-weight: 700; font-size: 23px; letter-spacing: 0.03em; text-transform: uppercase; display: flex; align-items: center; gap: 9px; }
        .brand .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 12px var(--accent); }
        .brand .vision { color: var(--accent); }
        .tagline { font-family: var(--mono); font-size: 10.5px; color: var(--slate); text-transform: uppercase; letter-spacing: 0.1em; padding-left: 16px; border-left: 1px solid var(--border); }
        .nav-links { margin-left: auto; display: flex; gap: 6px; }
        .nav-links a {
            font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em;
            color: var(--muted); padding: 8px 14px; border-radius: 6px; transition: all 0.15s ease;
        }
        .nav-links a:hover { color: var(--text); background: var(--surface); }

        main { padding: 56px 0 96px; }

        /* ---- Page head ---- */
        .eyebrow { font-family: var(--mono); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
        .eyebrow::before { content: ""; width: 22px; height: 1px; background: var(--accent); display: inline-block; }
        h1.page-title { font-family: var(--display); font-weight: 700; font-size: clamp(42px, 7.5vw, 68px); line-height: 0.95; letter-spacing: -0.01em; text-transform: uppercase; }
        .lede { color: var(--muted); font-size: 17px; max-width: 58ch; margin-top: 18px; }

        /* ---- Count bar ---- */
        .lib-count { font-family: var(--mono); font-size: 11px; color: var(--slate); text-transform: uppercase; letter-spacing: 0.12em; margin-top: 40px; padding-bottom: 12px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: baseline; }

        /* ---- Card grid ---- */
        .action-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; margin-top: 22px; }
        .action-card {
            background: linear-gradient(160deg, var(--surface), var(--base));
            border: 1px solid var(--border); border-radius: 10px;
            padding: 22px 22px 20px; display: flex; flex-direction: column; gap: 4px;
            position: relative; overflow: hidden; transition: border-color 0.18s ease, transform 0.18s ease, box-shadow 0.18s ease;
        }
        .action-card::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--accent); transform: scaleX(0); transform-origin: left; transition: transform 0.22s ease; }
        .action-card:hover { border-color: var(--border-lit); transform: translateY(-2px); box-shadow: 0 12px 30px -12px rgba(0,0,0,0.6); }
        .action-card:hover::before { transform: scaleX(1); }
        .card-top { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
        .card-cat { font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); background: var(--accent-soft); padding: 4px 9px; border-radius: 4px; }
        .card-name { font-family: var(--display); font-weight: 600; font-size: 28px; text-transform: uppercase; letter-spacing: 0.01em; line-height: 1.02; margin: 4px 0 2px; }
        .action-card:hover .card-name { color: var(--accent); }
        .card-diff { font-family: var(--mono); font-size: 10.5px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
        .card-arrow { font-family: var(--mono); font-size: 11px; color: var(--slate); margin-top: 14px; letter-spacing: 0.04em; }
        .action-card:hover .card-arrow { color: var(--accent); }

        .empty { border: 1px dashed var(--border-lit); border-radius: 10px; padding: 44px; text-align: center; color: var(--muted); margin-top: 22px; }

        /* ---- Detail: backlink ---- */
        .backlink { font-family: var(--mono); font-size: 11px; color: var(--slate); text-transform: uppercase; letter-spacing: 0.08em; display: inline-block; margin-bottom: 30px; transition: color 0.15s; }
        .backlink:hover { color: var(--accent); }

        /* ---- Scout meta / tags ---- */
        .scout-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 24px; padding: 18px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
        .tag { font-family: var(--mono); font-size: 11px; letter-spacing: 0.05em; text-transform: uppercase; padding: 6px 11px; border: 1px solid var(--border); border-radius: 5px; color: var(--muted); }
        .tag.accent { color: var(--accent); border-color: var(--accent-dim); background: var(--accent-soft); }

        /* ---- Section labels ---- */
        .section-label { font-family: var(--mono); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); margin: 48px 0 18px; padding-bottom: 10px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: baseline; }
        .section-label .hint { color: var(--slate); font-size: 10px; letter-spacing: 0.06em; }

        .breakdown p { font-size: 17px; line-height: 1.75; margin-bottom: 18px; max-width: 66ch; color: #D9D7D0; }

        /* ---- Play type chips ---- */
        .playtypes { display: flex; flex-wrap: wrap; gap: 8px; }
        .chip { font-family: var(--mono); font-size: 12px; letter-spacing: 0.03em; padding: 9px 13px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--text); }

        .stats-pending { border: 1px dashed var(--border-lit); border-radius: 8px; padding: 24px; font-family: var(--mono); font-size: 12px; color: var(--slate); letter-spacing: 0.03em; line-height: 1.7; }

        /* ---- Film examples ---- */
        .example { border: 1px solid var(--border); border-radius: 9px; padding: 20px 22px; margin-bottom: 14px; background: var(--surface); }
        .example .ex-title { font-family: var(--display); font-weight: 600; font-size: 21px; text-transform: uppercase; }
        .example .ex-player { color: var(--muted); font-style: normal; }
        .example .ex-link { font-family: var(--mono); font-size: 12px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.05em; display: inline-block; margin: 12px 0 4px; }
        .example .ex-link:hover { text-decoration: underline; }
        .example .ex-note { color: var(--muted); font-size: 15px; }

        /* ---- Player header ---- */
        .player-header { display: flex; align-items: stretch; justify-content: space-between; gap: 32px; }
        .player-header .ph-text { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: flex-end; }
        .player-photo-wrap { flex-shrink: 0; width: 230px; border-radius: 12px; overflow: hidden; border: 1px solid var(--border-lit); background: linear-gradient(160deg, var(--raised), var(--surface)); position: relative; }
        .player-photo-wrap::after { content: ""; position: absolute; inset: 0; box-shadow: inset 0 -40px 50px -20px rgba(11,13,16,0.9); pointer-events: none; }
        .player-photo { width: 100%; height: 175px; object-fit: cover; object-position: top center; display: block; }
        @media (max-width: 660px) {
            .player-header { flex-direction: column-reverse; align-items: stretch; }
            .player-photo-wrap { width: 160px; }
            .player-photo { height: 120px; }
        }

        /* ---- Stat strip ---- */
        .stat-strip { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; margin-top: 26px; }
        .stat-box { background: linear-gradient(160deg, var(--surface), var(--base)); border: 1px solid var(--border); border-radius: 10px; padding: 18px 20px; }
        .stat-box .sb-val { font-family: var(--display); font-weight: 700; font-size: 34px; line-height: 1; color: var(--text); }
        .stat-box .sb-val.accent { color: var(--accent); }
        .stat-box .sb-label { font-family: var(--mono); font-size: 10px; color: var(--slate); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 8px; }

        /* ---- Season filter ---- */
        .season-filter { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 24px; }
        .season-pill { font-family: var(--mono); font-size: 11px; letter-spacing: 0.05em; padding: 7px 13px; border: 1px solid var(--border); border-radius: 6px; color: var(--muted); transition: all 0.15s; }
        .season-pill.active { color: var(--accent); border-color: var(--accent-dim); background: var(--accent-soft); }
        .season-pill:hover { color: var(--text); border-color: var(--border-lit); }

        /* ---- Chart toggle ---- */
        .chart-toggle { display: inline-flex; gap: 0; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
        .toggle-btn { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; padding: 6px 13px; cursor: pointer; background: var(--surface); border: none; color: var(--muted); transition: all 0.15s; }
        .toggle-btn.active { color: var(--base); background: var(--accent); }

        /* ---- Court ---- */
        .court-wrap {
            margin-top: 22px; padding: 24px;
            background:
                radial-gradient(120% 90% at 50% 8%, #1c2229 0%, #12161b 55%, #0d1014 100%);
            border: 1px solid var(--border-lit); border-radius: 12px; max-width: 560px;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
        }
        #court { width: 100%; height: auto; display: block; }
        .court-legend { display: flex; gap: 20px; margin-top: 16px; font-family: var(--mono); font-size: 10.5px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
        .court-legend span { display: flex; align-items: center; gap: 7px; }
        .lg-make { width: 9px; height: 9px; border-radius: 50%; background: var(--make); }
        .lg-miss { width: 9px; height: 9px; border-radius: 50%; border: 1.5px solid var(--miss); }

        /* ---- Zone table ---- */
        .zone-table { display: flex; flex-direction: column; gap: 8px; }
        .zone-row { display: grid; grid-template-columns: 1.4fr 2.2fr 46px 66px; align-items: center; gap: 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 13px 18px; transition: border-color 0.15s; }
        .zone-row:hover { border-color: var(--border-lit); }
        .zone-name { font-family: var(--body); font-size: 14px; font-weight: 500; color: var(--text); }
        .zone-bar-wrap { height: 7px; background: var(--base); border-radius: 4px; overflow: hidden; }
        .zone-bar { display: block; height: 100%; background: linear-gradient(90deg, var(--accent-dim), var(--accent)); border-radius: 4px; }
        .zone-pct { font-family: var(--display); font-weight: 700; font-size: 19px; color: var(--text); text-align: right; }
        .zone-att { font-family: var(--mono); font-size: 11px; color: var(--slate); text-align: right; }
        @media (max-width: 560px) { .zone-row { grid-template-columns: 1.2fr 42px 58px; } .zone-bar-wrap { display: none; } }

        footer { border-top: 1px solid var(--border); padding: 32px 0; font-family: var(--mono); font-size: 11px; color: var(--slate); text-transform: uppercase; letter-spacing: 0.08em; display: flex; justify-content: space-between; }

        :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
        @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }

        /* ---- Mobile ---- */
        @media (max-width: 680px) {
            .wrap { padding: 0 18px; }
            .masthead { padding: 14px 0; }
            .masthead .wrap { gap: 10px; }
            .brand { font-size: 19px; gap: 7px; }
            .tagline { display: none; }              /* decorative — hide on phones */
            .nav-links { gap: 2px; }
            .nav-links a { padding: 7px 10px; font-size: 10px; letter-spacing: 0.06em; }

            main { padding: 36px 0 64px; }
            h1.page-title { font-size: clamp(34px, 11vw, 46px); }
            .lede { font-size: 15px; }

            .action-grid { grid-template-columns: 1fr; gap: 12px; }
            .stat-strip { grid-template-columns: 1fr 1fr; }
            .player-header { gap: 20px; }
            .court-wrap { padding: 14px; }
            .section-label { margin: 36px 0 14px; }
            .court-legend { flex-wrap: wrap; gap: 12px; }
            .court-legend span[style] { margin-left: 0 !important; width: 100%; }
        }

        @media (max-width: 400px) {
            .stat-strip { grid-template-columns: 1fr 1fr; }
            .nav-links a { padding: 6px 7px; }
            .brand { font-size: 17px; }
        }
    </style>
</head>
<body>
    <header class="masthead">
        <div class="wrap">
            <a href="{% url 'library:action_list' %}" class="brand"><span class="dot"></span>Court<span class="vision">Vision</span></a>
            <span class="tagline">Learn to read the game</span>
            <nav class="nav-links">
                <a href="{% url 'library:action_list' %}">Actions</a>
                <a href="{% url 'library:player_list' %}">Players</a>
            </nav>
        </div>
    </header>
    <main>
        <div class="wrap">
            {% block content %}{% endblock %}
        </div>
    </main>
    <footer>
        <div class="wrap">
            <span>Court Vision</span>
            <span>Basketball film study</span>
        </div>
    </footer>
</body>
</html>
